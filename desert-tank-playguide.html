  var currentLang = 'en';

  function getStoredLang() {
    try {
      var s = localStorage.getItem(STORAGE_KEY);
      if (s && LOCALES.indexOf(s) >= 0) return s;
    } catch (e) {}
    return null;
  }

  function setStoredLang(code) {
    try { localStorage.setItem(STORAGE_KEY, code); } catch (e) {}
  }

  function applyDocumentLang(code) {
    var P = pack[code];
    var root = document.documentElement;
    root.setAttribute('lang', P.htmlLang);
    if (P.dir === 'rtl') {
      root.setAttribute('dir', 'rtl');
    } else {
      root.removeAttribute('dir');
    }
  }

  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
  }

  function buildLangTabs() {
    var nav = document.getElementById('lang-tabs');
    nav.innerHTML = '';
    for (var i = 0; i < LOCALES.length; i++) {
      var code = LOCALES[i];
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.setAttribute('data-lang', code);
      btn.textContent = LOCALE_LABELS[code];
      if (code === currentLang) btn.className = 'active';
      btn.addEventListener('click', function () {
        var c = this.getAttribute('data-lang');
        if (c === currentLang) return;
        currentLang = c;
        setStoredLang(c);
        render();
      });
      nav.appendChild(btn);
    }
  }

  function renderHeader(P) {
    document.getElementById('hdr-badge').textContent = P.badge;
    document.getElementById('hdr-title').textContent = P.hdrTitle;
    document.getElementById('hdr-sub').textContent = P.hdrSub;
    document.getElementById('q').placeholder = P.searchPh;
    document.getElementById('no-results').textContent = P.noResults;
  }

  function renderNav(P) {
    var n = P.nav;
    var keys = ['overview', 'campaign', 'controls', 'skills', 'units', 'map', 'meta'];
    var html = '';
    for (var i = 0; i < keys.length; i++) {
      var k = keys[i];
      html += '<a href="#' + k + '">' + esc(n[k]) + '</a>';
    }
    document.getElementById('nav-tags').innerHTML = html;
  }

  function renderFacts(P) {
    var el = document.getElementById('quick-facts');
    el.innerHTML = '';
    for (var i = 0; i < P.facts.length; i++) {
      var f = P.facts[i];
      var d = document.createElement('div');
      d.className = 'fact';
      d.innerHTML = '<strong>' + esc(f.n) + '</strong><span>' + esc(f.l) + '</span>';
      el.appendChild(d);
    }
  }

  function renderMainFixed(P) {
    var order = ['overview', 'campaign', 'controls', 'skills', 'units', 'map', 'meta'];
    var main = document.getElementById('main');
    main.innerHTML = '';
    for (var s = 0; s < order.length; s++) {
      var key = order[s];
      var sec = P.sections[key];
      var section = document.createElement('section');
      section.id = key;
      var h2 = document.createElement('h2');
      h2.textContent = sec.title;
      section.appendChild(h2);
      var grid = document.createElement('div');
      grid.className = 'card-grid' + (key === 'controls' || key === 'units' ? ' cols-2' : '');
      for (var c = 0; c < sec.cards.length; c++) {
        var card = sec.cards[c];
        var div = document.createElement('div');
        div.className = 'card';
        div.setAttribute('data-keywords', card.kw);
        var h3 = document.createElement('h3');
        var tagSp = document.createElement('span');
        tagSp.className = 'tag ' + card.cls;
        tagSp.textContent = card.tag;
        h3.appendChild(tagSp);
        var temp = document.createElement('div');
        temp.innerHTML = card.html;
        var first = temp.firstElementChild;
        var titleSpan = document.createElement('span');
        titleSpan.style.fontWeight = '700';
        titleSpan.style.color = 'var(--text)';
        if (first && first.tagName === 'P') {
          var strong = first.querySelector('strong');
          if (strong) titleSpan.textContent = strong.textContent;
          else titleSpan.textContent = card.tag;
        } else if (first && first.tagName === 'UL') {
          titleSpan.textContent = card.tag;
        } else if (first && first.tagName === 'TABLE') {
          titleSpan.textContent = card.tag;
        } else {
          titleSpan.textContent = card.tag;
        }
        h3.appendChild(titleSpan);
        div.appendChild(h3);
        while (temp.firstChild) div.appendChild(temp.firstChild);
        grid.appendChild(div);
      }
      section.appendChild(grid);
      main.appendChild(section);
    }
  }

  function renderFooter(P) {
    var f = document.getElementById('footer');
    f.innerHTML = '<p>' + esc(P.footerLines[0]) + '</p><p>' + esc(P.footerLines[1]) + '</p>';
  }

  function runSearch() {
    var P = pack[currentLang];
    var qel = document.getElementById('q');
    var q = (qel.value || '').trim().toLowerCase();
    var cards = document.querySelectorAll('.card');
    var visible = 0;
    var total = cards.length;
    for (var i = 0; i < cards.length; i++) {
      var card = cards[i];
      var kw = (card.getAttribute('data-keywords') || '').toLowerCase();
      var txt = card.textContent.toLowerCase();
      var ok = !q || kw.indexOf(q) >= 0 || txt.indexOf(q) >= 0;
      card.classList.toggle('hidden-by-search', !ok);
      card.classList.toggle('match', !!q && ok);
      if (ok) visible++;
    }
    var hint = document.getElementById('result-hint');
    hint.textContent = P.resultFmt(visible, total);
    document.getElementById('no-results').classList.toggle('visible', q.length > 0 && visible === 0);
  }

  function render() {
    applyDocumentLang(currentLang);
    var P = pack[currentLang];
    renderHeader(P);
    renderNav(P);
    renderFacts(P);
    renderMainFixed(P);
    renderFooter(P);
    buildLangTabs();
    var qel = document.getElementById('q');
    qel.value = '';
    runSearch();
  }

  currentLang = getStoredLang() || 'en';
  document.getElementById('q').addEventListener('input', runSearch);
  document.getElementById('q').addEventListener('search', runSearch);
  render();
})();
